name: Release

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing numeric x.x.x git tag to publish or repair
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag name
        id: resolve_tag
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.tag }}"
          fi
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_ENV"

      - name: Validate Obsidian release tag format
        shell: bash
        run: |
          TAG_NAME="${{ steps.resolve_tag.outputs.tag_name }}"
          if [[ ! "$TAG_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Obsidian releases must use numeric x.x.x tags without a v prefix: $TAG_NAME" >&2
            exit 1
          fi

      - name: Check out release ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ steps.resolve_tag.outputs.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Run test suite
        run: npm test -- --runInBand

      - name: Audit UI i18n surfaces
        run: npm run audit:i18n-ui

      - name: Audit render-host bundle packaging
        run: npm run audit:render-host

      - name: Check diff hygiene
        run: git diff --check

      - name: Publish or repair GitHub release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:github -- "$TAG_NAME"
